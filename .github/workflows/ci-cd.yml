# ci-cd.yml — GitHub Actions workflow for PipelinePilot
# Triggers: push to main branch
#
# Pipeline stages:
#   1. Run backend tests
#   2. Build Docker images
#   3. Push images to Docker Hub
#   4. Deploy to Kubernetes (kubectl apply)
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   — your Docker Hub username
#   DOCKERHUB_TOKEN      — Docker Hub access token (Settings → Security)
#   KUBE_CONFIG          — base64-encoded kubeconfig (cat ~/.kube/config | base64)

name: PipelinePilot CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # Run tests on PRs but skip the deploy job

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/pipelinepilot-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/pipelinepilot-frontend

jobs:

  # ── Job 1: Backend tests ─────────────────────────────────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short
        # Tests use SQLite (no MySQL required in CI)

  # ── Job 2: Build & Push Docker Images ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-backend                  # Only runs if tests pass
    if: github.ref == 'refs/heads/main'  # Skip on PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag images with both the git SHA (immutable) and 'latest'
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Kubernetes ───────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production   # Requires a manual approval gate if configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

      # Update image tags in-place so Kubernetes pulls the exact SHA-tagged images
      - name: Update image tags in manifests
        run: |
          sed -i "s|yourdockerhubuser|${{ env.DOCKERHUB_USERNAME }}|g" kubernetes/*.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" kubernetes/backend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" kubernetes/frontend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f kubernetes/

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend  --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Print deployment status
        run: kubectl get deployments,services,pods
